services:
  - type: web
    name: cinematch-ai
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless true --server.runOnSave false
    envVars:
      - key: TMDB_API_KEY
        sync: false  # You need to set this manually in Render dashboard